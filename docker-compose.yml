version: '3.9'

services:
  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ai-task-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-adminpass}
      - MONGO_INITDB_DATABASE=ai-task-platform
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-task-network

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ai-task-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-task-network

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ai-task-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Use local MongoDB container by default; override with MONGO_URI env var for Atlas
      - MONGO_URI=${MONGO_URI:-mongodb://admin:adminpass@mongodb:27017/ai-task-platform?authSource=admin}
      - JWT_SECRET=${JWT_SECRET:-change_this_jwt_secret_min_32_chars_long}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change_this_refresh_secret_min_32_chars}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:5173
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-task-network

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: ai-task-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-task-network

  # ── Python Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
      target: production
    container_name: ai-task-worker
    restart: unless-stopped
    environment:
      # Use local MongoDB container by default; override with MONGO_URI env var for Atlas
      - MONGO_URI=${MONGO_URI:-mongodb://admin:adminpass@mongodb:27017/ai-task-platform?authSource=admin}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WORKER_CONCURRENCY=4
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - worker_logs:/app/logs
    networks:
      - ai-task-network

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  worker_logs:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  ai-task-network:
    driver: bridge
