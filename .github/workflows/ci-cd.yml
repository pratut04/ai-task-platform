name: CI/CD Pipeline — AI Task Platform

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ai-task

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & Test — Backend
  # ────────────────────────────────────────────────────────────────────────
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript check)
        run: npm run build

      - name: Run tests
        run: npm test

  # ────────────────────────────────────────────────────────────────────────
  # Job 2: Lint — Frontend
  # ────────────────────────────────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────
  # Job 3: Lint — Python Worker
  # ────────────────────────────────────────────────────────────────────────
  worker-lint:
    name: Worker — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: pip install flake8 black

      - name: Black format check
        run: black --check .

      - name: Flake8 lint
        run: flake8 . --max-line-length=120 --exclude=__pycache__

  # ────────────────────────────────────────────────────────────────────────
  # Job 4: Build & Push Docker Images (only on main)
  # ────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build, worker-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}
      worker-tag: ${{ steps.meta-worker.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ── Backend ──────────────────────────────────────────────────────
      - name: Backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.sha.outputs.short }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

      # ── Frontend ─────────────────────────────────────────────────────
      - name: Frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.sha.outputs.short }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

      # ── Worker ───────────────────────────────────────────────────────
      - name: Worker metadata
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.sha.outputs.short }}

      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  # ────────────────────────────────────────────────────────────────────────
  # Job 5: Update Infrastructure Repo (trigger ArgoCD sync)
  # ────────────────────────────────────────────────────────────────────────
  update-infra:
    name: Update Infrastructure Repo
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Extract short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: pratut04/ai-task-platform-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update image tags in k8s manifests
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short }}
          
          # Update backend image tag
          sed -i "s|ai-task-backend:.*|ai-task-backend:${SHORT_SHA}|g" infra/k8s/base/backend.yaml
          
          # Update frontend image tag
          sed -i "s|ai-task-frontend:.*|ai-task-frontend:${SHORT_SHA}|g" infra/k8s/base/services.yaml
          
          # Update worker image tag
          sed -i "s|ai-task-worker:.*|ai-task-worker:${SHORT_SHA}|g" infra/k8s/base/worker.yaml

      - name: Commit & push infrastructure changes
        run: |
          cd infra
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ steps.sha.outputs.short }} [skip ci]"
          git push
