---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-task-config
  namespace: ai-task-platform
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  CLIENT_URL: "https://ai-task.example.com"
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  REDIS_URL: "redis://redis-service:6379"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
